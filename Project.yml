name: Pigment
options:
  bundleIdPrefix: com.bimboware
  deploymentTarget:
    macOS: "13.0"
  generateEmptyDirectories: true
configs:
  Debug: debug
  Release: release
targets:
  Pigment:
    type: application
    platform: macOS
    scheme:
      gatherCoverageData: false
    sources:
      - path: Pigment
    settings:
      base:
        PRODUCT_NAME: Pigment
        PRODUCT_BUNDLE_IDENTIFIER: com.bimboware.pigment
        SWIFT_VERSION: "5.9"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        ARCHS: "arm64 x86_64"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        INFOPLIST_FILE: Pigment/Info.plist
        CODE_SIGN_ENTITLEMENTS: ""
    info:
      path: Pigment/Info.plist
      properties:
        CFBundleDisplayName: Pigment
        CFBundleIdentifier: com.bimboware.pigment
        NSMainNibFile: ""
        NSPrincipalClass: NSApplication
        LSMinimumSystemVersion: "13.0"
        CFBundleDocumentTypes:
          - CFBundleTypeName: Image
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            CFBundleTypeExtensions:
              - png
              - jpg
              - jpeg
              - bmp
            CFBundleTypeIconFile: ""
        CFBundleName: Pigment
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
